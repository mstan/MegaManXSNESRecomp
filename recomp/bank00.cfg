# bank00.cfg — Mega Man X
#
# Minimum viable seed: read the SNES interrupt vector table directly
# from the ROM at $00:FFE0-FFFF. The recompiler auto-discovers more
# from static reachability + dispatch-table scans.

bank = 0

# Read the SNES vector table (I_RESET, I_NMI, I_IRQ) directly from
# ROM bytes at $00:FFE0-FFFF.
auto_vectors

# Mega Man X uses long-mode (JML) vectors: the stubs at $00:8000,
# $00:FFA4, $00:FFA8 immediately JML into bank $80. Banks $80-$BF
# are LoROM mirrors of $00-$3F (same physical bytes), so declare
# the real handler entries against their $00 PC and alias the $80
# cross-bank names so the JML resolves.
func ResetHandler 8007
func NmiHandler   8168
func IrqHandler   84a1
name 808007 ResetHandler
name 808168 NmiHandler
name 8084a1 IrqHandler

# TODO: HLE the cooperative task scheduler at $00:8099.
#
# Confirmed against the public disassembly at
# https://github.com/MarkAlarm/MMX1-Disassembly. The asm at $8099 is
# a *cooperative-coroutine task scheduler*, not a normal frame loop:
#
#   slot fields per 16-byte slot in $0030-$006F (4 task slots):
#     $30,X = state (0=empty, 1=ready, 2=delayed, 3=suspended)
#     $31,X = delay countdown (state 2)
#     $32,X / $33,X = handler PC (16-bit, used for JMP (abs,X) at $80E6)
#     $34,X / $35,X = saved S (16-bit, used to resume state-3 tasks)
#     $36,X / $37,X = entry-task S setup (16-bit, used for state-1 start)
#
#   $80A1-$80A5  spin on $0B9D (vblank flag); NMI sets to $FF
#   $80A6        INC $0B9B (frame counter)
#   $80AB-$80C4  iterate X = 0,$10,$20,..,$60: dispatch by state
#     state=1 -> $80DA: TCS to slot's entry-S, JMP ($0032,X)
#     state=2 (expired) -> $80E9: REP #$30, TCS to saved-S, PLP/PLY/PLX/RTS
#                                 (resume the suspended task)
#     state=3 (already-running, suspended) -> X+=$10, continue loop
#   $80C6  STZ $0B9D
#   $80C9  JMP $8099    (infinite outer loop)
#
# Tasks yield via $80F8:  SEP #$30 ; LDX $A0 ; STZ $30,X ; BRA $80B9
# (mark slot as ready, fall back into the dispatch loop's next-slot path).
#
# To run this from C-host without infinite-looping, we need a
# C-side scheduler that:
#   1. Iterates the four task slots one per frame call (the C function
#      returns to the runner instead of spinning on $0B9D).
#   2. For state=1 slots, JSRs into the cfg-named handler whose
#      address is at ($0032+slot_off). This requires declaring every
#      task entry-PC as a cfg `func` (4 initial tasks + every task
#      they spawn).
#   3. For state=3 slots, restores the saved stack frame the same way
#      Zelda's `ZeldaRunPolyLoop` does, then JSRs into the handler
#      at the post-yield PC.
#
# This is the largest remaining MMX gap. The JMP ($0032,X) at $80E6
# is the indirect-dispatch site reported by v2_regen — authorising it
# manually requires per-task-slot enumeration of installed handler PCs.
