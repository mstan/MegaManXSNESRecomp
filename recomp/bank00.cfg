# bank00.cfg — Mega Man X
#
# Minimum viable seed: read the SNES interrupt vector table directly
# from the ROM at $00:FFE0-FFFF. The recompiler auto-discovers more
# from static reachability + dispatch-table scans.

bank = 0

# Read the SNES vector table (I_RESET, I_NMI, I_IRQ) directly from
# ROM bytes at $00:FFE0-FFFF.
auto_vectors

# Mega Man X uses long-mode (JML) vectors: the stubs at $00:8000,
# $00:FFA4, $00:FFA8 immediately JML into bank $80. Banks $80-$BF
# are LoROM mirrors of $00-$3F (same physical bytes), so declare
# the real handler entries against their $00 PC and alias the $80
# cross-bank names so the JML resolves.
func ResetHandler 8007
func NmiHandler   8168
func IrqHandler   84a1
name 808007 ResetHandler
name 808168 NmiHandler
name 8084a1 IrqHandler
